specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: NftLaunchpad
    network: sepolia
    source:
      address: "0xF6CFcFdA5D5C56892e7440064EF1033495Eb19Fc"
      abi: NftLaunchpad
      startBlock: 11096535
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Mint
        - PhaseChange
        - Referral
        - DayMintStats
        - CollectionStats
      abis:
        - name: NftLaunchpad
          file: ./abis/NftLaunchpad.json
      eventHandlers:
        - event: Minted(indexed address,indexed uint256,uint256,uint8)
          handler: handleMinted
        - event: PhaseChanged(uint8,uint8)
          handler: handlePhaseChanged
        - event: ReferralRewarded(indexed address,indexed address,uint256)
          handler: handleReferralRewarded
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/nft-launchpad.ts
