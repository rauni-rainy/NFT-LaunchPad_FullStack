type Mint @entity(immutable: true) {
  id: ID!                          # tx hash + log index
  tokenId: BigInt!
  quantity: BigInt!
  minter: Bytes!
  phase: String!                   # "OG" | "ALLOWLIST" | "PUBLIC"
  pricePerToken: BigInt!
  totalPaid: BigInt!
  referrer: Bytes                  # nullable
  blockTimestamp: BigInt!
  blockNumber: BigInt!
}

type PhaseChange @entity(immutable: true) {
  id: ID!
  oldPhase: String!
  newPhase: String!
  blockTimestamp: BigInt!
}

type Referral @entity(immutable: false) {
  id: ID!                          # referrer address (cumulative per referrer)
  referrer: Bytes!
  totalEarned: BigInt!
  totalClaimed: BigInt!
  pendingRewards: BigInt!
}

type DayMintStats @entity(immutable: false) {        # aggregated per day for the velocity chart
  id: ID!                          # date string YYYY-MM-DD
  date: String!
  mintCount: BigInt!
  revenue: BigInt!
  uniqueMinters: BigInt!
}

type CollectionStats @entity(immutable: false) {     # singleton, id = "global"
  id: ID!
  totalMinted: BigInt!
  totalRevenue: BigInt!
  uniqueHolders: BigInt!
  currentPhase: String!
}
